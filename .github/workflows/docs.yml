name: Build and Deploy Docs

# ONE unified pipeline (same shape as the snapshot.show SaaS snapshot.yml):
#   discover → export matrix (one hash-cached job per notebook) → build → deploy.
# The notebook list (slugs + source paths) comes from docs/notebook_jobs.jl — the
# SAME source export_notebooks.jl reads — so the matrix and the export can never
# disagree on a slug. A docs-only push hits the cache on every notebook (near-
# instant matrix, just rebuild + redeploy); an engine/notebook change recompiles
# only the affected notebooks in parallel. No stale docs, no manual re-emit.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Ignore the cache and force-rebuild every notebook"
        type: boolean
        default: false
      committed_exports:
        description: "Skip notebook exports and deploy the committed certified bundle"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # Keep the committed/generated notebook corpus reproducible while the newest
  # WasmTarget fixes are ahead of the next registry release.
  SNAPSHOT_WT_REF: cadb908093efee3b08a065f50930d3337916391d

jobs:
  # ── 1. discover — read the canonical notebook list (shared source of truth) ──
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with: { version: '1.12' }
      - id: list
        name: Notebook matrix (from docs/notebook_jobs.jl — dep-free)
        run: |
          matrix=$(julia docs/notebook_jobs.jl --json)
          echo "matrix={\"notebook\":$matrix}" >> "$GITHUB_OUTPUT"
          echo "→ $matrix"

  # ── 2. export (parallel, one notebook per job, hash-cached) ────────────────
  export:
    needs: discover
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.committed_exports) }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout Snapshot.jl
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { path: Snapshot.jl }
      - id: cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: Snapshot.jl/_nbout
          # v8: require the released canvas-safe WasmTarget floor (v0.5.2).
          # The engine-content hash means
          # dependency-contract changes in Project.toml bust every notebook.
          # Only changes to
          # src/, assets/, the export driver, or Project.toml bust a notebook's
          # cache. A docs-site or README push now genuinely cache-hits every
          # notebook. (v5 was the Snapshot.jl rename; v4 the node 20→22
          # WasmGC-oracle fix; node-version still isn't in the key.)
          key: snap-nbexport-v9-wt${{ env.SNAPSHOT_WT_REF }}-${{ matrix.notebook.slug }}-${{ hashFiles(format('Snapshot.jl/{0}', matrix.notebook.path)) }}-eng${{ hashFiles('Snapshot.jl/src/**', 'Snapshot.jl/assets/**', 'Snapshot.jl/docs/export_notebooks.jl', 'Snapshot.jl/Project.toml') }}-${{ inputs.force && github.run_id || 'cache' }}
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with: { version: '1.12' }
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9 # v2
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        # node 22+: WebAssembly GC is on by DEFAULT. The export oracle runs `node
        # <js> <wasm>` to differentially verify each island; WasmTarget emits WasmGC
        # (type code 0x50), which node 20 rejects ("enable with --experimental-wasm-
        # gc") — and that flag is itself removed on modern node. node 20 here silently
        # failed EVERY oracle → every cell judged fallback → all notebooks went static
        # (the "0/104 live across 0 notebooks" bug). Must match snapshot.yml (node 22).
        with: { node-version: '22' }
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Preflight — node MUST run WasmGC (else the oracle degrades every cell to static)
        run: |
          node -e '
            const m = new Uint8Array([0,97,115,109,1,0,0,0,1,3,1,0x5f,0]); // (module (type (struct))) — minimal WasmGC
            WebAssembly.compile(m).then(
              () => { console.log("WasmGC OK on " + process.version); },
              (e) => { console.error("FATAL: node " + process.version + " cannot compile WasmGC — exports would all fall back to static. " + e); process.exit(1); }
            );'
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Instantiate released Snapshot compiler stack
        working-directory: Snapshot.jl
        env:
          JULIA_PKG_SERVER: ""
        run: |
          julia --project=. -e '
            using Pkg
            try Pkg.Registry.rm("General") catch end
            Pkg.Registry.add("General")
            Pkg.instantiate()
            Pkg.add(url="https://github.com/GroupTherapyOrg/WasmTarget.jl",
                    rev=ENV["SNAPSHOT_WT_REF"])
            wt = only(v for v in values(Pkg.dependencies()) if v.name == "WasmTarget")
            wt.version >= v"0.5.2" || error("Snapshot canvas export requires WasmTarget >= 0.5.2, resolved $(wt.version)")
            wt.git_revision == ENV["SNAPSHOT_WT_REF"] ||
              error("Snapshot export compiler resolved unexpected WasmTarget revision $(wt.git_revision)")
            println("Snapshot export compiler: WasmTarget ", wt.version, " @ ", wt.git_revision)
          '
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Export this notebook → WASM islands (cache miss → force-rebuild it)
        working-directory: Snapshot.jl
        env:
          FORCE_NB_REBUILD: '1'
        run: julia --project=. --optimize=3 docs/export_notebooks.jl "${{ matrix.notebook.slug }}"
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Stage just this notebook's outputs (slugs are underscored)
        working-directory: Snapshot.jl
        run: |
          mkdir -p _nbout
          slug='${{ matrix.notebook.slug }}'
          cp -v  "docs/notebooks-static/${slug}.html"          "_nbout/" 2>/dev/null || true
          cp -v  "docs/notebooks-static/${slug}.fragment.html" "_nbout/" 2>/dev/null || true
          cp -rv "docs/notebooks-static/${slug}.islands"       "_nbout/" 2>/dev/null || true
          python3 - "$slug" <<'PY'
          import sys, json
          slug = sys.argv[1]
          idx = json.load(open("docs/notebooks-static/index.json"))
          e = next((x for x in idx if x.get("slug") == slug), None)
          json.dump(e, open(f"_nbout/_entry_{slug}.json", "w"))
          PY
      - name: Cache status
        run: echo "${{ matrix.notebook.slug }} cache-hit=${{ steps.cache.outputs.cache-hit || 'false' }}"
      - name: Upload notebook export
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nb-${{ matrix.notebook.slug }}
          path: Snapshot.jl/_nbout
          retention-days: 7
          if-no-files-found: warn

  # ── 3. build the Therapy docs site from the fresh exports ──────────────────
  build:
    needs: export
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Gather the per-notebook exports over the committed seed
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.committed_exports) }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: nb-*
          path: _artifacts
          merge-multiple: true
      - name: Merge into docs/notebooks-static + rebuild index.json
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.committed_exports) }}
        run: |
          mkdir -p docs/notebooks-static
          shopt -s dotglob nullglob
          for item in _artifacts/*; do
            base=$(basename "$item")
            case "$base" in
              _entry_*.json) : ;;
              *) cp -rv "$item" "docs/notebooks-static/" ;;
            esac
          done
          if ls _artifacts/_entry_*.json >/dev/null 2>&1; then
            python3 - <<'PY'
          import glob, json
          entries = []
          for f in sorted(glob.glob("_artifacts/_entry_*.json")):
              try: d = json.load(open(f))
              except Exception: d = None
              if d: entries.append(d)
          entries.sort(key=lambda e: e.get("slug", ""))
          json.dump(entries, open("docs/notebooks-static/index.json", "w"), indent=2)
          print(f"combined index.json: {len(entries)} notebooks")
          PY
          else
            echo "no fresh entries — keeping committed index.json"
          fi
      - name: Guard featured-notebook interactivity
        run: python3 docs/verify_notebook_coverage.py docs/notebooks-static/index.json
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with: { version: '1.12' }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: '22' }   # match the export job + snapshot.yml (WasmGC default)
      - uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9 # v2
      - name: Install Julia docs deps
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.resolve()
            Pkg.instantiate()
            deps = Pkg.dependencies()
            th = only(v for v in values(deps) if v.name == "Therapy")
            wt = only(v for v in values(deps) if v.name == "WasmTarget")
            th.version >= v"0.2.3" || error("Snapshot docs require Therapy >= 0.2.3, resolved $(th.version)")
            wt.version >= v"0.5.2" || error("Snapshot docs require WasmTarget >= 0.5.2, resolved $(wt.version)")
            println("Snapshot docs stack: Therapy ", th.version, ", WasmTarget ", wt.version)
          '
      - name: Build DaisyUI stylesheet (Tailwind v4)
        working-directory: docs
        run: |
          npm ci
          npm run css
      - name: Build docs site
        run: julia --project=docs --optimize=3 docs/app.jl build
      - uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4
      # upload-pages-artifact's composite action invokes mutable
      # actions/upload-artifact@v4 internally, which violates this repository's
      # SHA-only Actions policy. Reproduce its documented tar layout and invoke
      # the audited upload action directly.
      - name: Archive GitHub Pages artifact
        run: |
          tar --dereference --hard-dereference \
            --directory docs/dist \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    # `committed_exports=true` intentionally skips the export matrix. Without
    # an explicit condition GitHub propagates that upstream skip through the
    # otherwise-successful build and silently skips deployment too.
    if: ${{ always() && needs.build.result == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
