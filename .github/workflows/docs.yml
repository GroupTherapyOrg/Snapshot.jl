name: Build and Deploy Docs

# The notebook exports under docs/notebooks-static/ are pre-rendered locally
# (julia --project=. docs/export_notebooks.jl) and COMMITTED — hash-cached, so
# they only change when a notebook's source changes. CI never runs notebooks:
# it builds the Therapy.jl site around the committed exports and deploys.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/cache@v2

      - name: Install docs dependencies
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.resolve()
            Pkg.instantiate()
          '

      - name: Build docs site
        run: |
          julia --project=docs --optimize=3 docs/app.jl build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
