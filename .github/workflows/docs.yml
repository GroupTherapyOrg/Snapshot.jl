name: Build and Deploy Docs

# The notebook exports under docs/notebooks-static/ are pre-rendered locally
# (julia --project=. docs/export_notebooks.jl) and COMMITTED — hash-cached, so
# they only change when a notebook's source changes. CI never runs notebooks:
# it builds the Therapy.jl site (+ the npm Tailwind/DaisyUI stylesheet) around
# the committed exports and deploys.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: julia-actions/cache@v2

      # The two independent prep steps run CONCURRENTLY (GitHub Actions parallel-
      # steps syntax, 2026): the slow Julia precompile alongside the npm Tailwind v4
      # + DaisyUI build (app.jl is tailwind=false, so we own the stylesheet). The
      # group implicitly waits for both before the next step. Both write the docs
      # site needs: the instantiated Julia env + docs/assets/styles.css.
      - parallel:
          - name: Install Julia docs dependencies
            run: |
              julia --project=docs -e '
                using Pkg
                Pkg.Registry.add("General")
                Pkg.resolve()
                Pkg.instantiate()
              '

          - name: Build DaisyUI stylesheet (Tailwind v4)
            working-directory: docs
            run: |
              npm install
              npm run css   # tailwindcss -i input.css -o assets/styles.css --minify

      - name: Build docs site
        run: |
          julia --project=docs --optimize=3 docs/app.jl build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
