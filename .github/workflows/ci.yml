name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run tests
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.instantiate()
            Pkg.test()
          '
