name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # The main project pins WasmTarget via [sources] {path = "../WasmTarget.jl"}
      # (so WT's downstream CI can test PI against WT main). actions/checkout can't
      # write outside the workspace, so clone WT to the expected sibling path here.
      - name: Check out WasmTarget as a sibling (resolves the [sources] path pin)
        run: git clone --depth 1 https://github.com/GroupTherapyOrg/WasmTarget.jl ../WasmTarget.jl
      - name: Run tests
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.instantiate()
            Pkg.test()
          '
