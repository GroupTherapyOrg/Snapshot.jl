name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Exercise the pending WT release directly until 0.5 is in General. The
      # package metadata itself stays registry-clean (no local [sources] path).
      - name: Check out WasmTarget 0.5 release candidate
        run: git clone --depth 1 --branch wt-tag-run https://github.com/GroupTherapyOrg/WasmTarget.jl ../WasmTarget.jl
      - name: Run tests
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.develop(path="../WasmTarget.jl")
            Pkg.instantiate()
            Pkg.test()
          '
