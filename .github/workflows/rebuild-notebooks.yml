name: Rebuild Notebook Exports (parallel)

# Re-exports the featured notebooks to WASM islands IN PARALLEL — one job per
# notebook (strategy.matrix) — then commits the refreshed exports and redeploys
# the docs. This is the permanent fix for the stale-docs hand-off: a change to the
# export ENGINE (src/**, assets/shim.js) or to a notebook auto-rebuilds the
# affected exports and ships them, instead of needing a manual local re-emit.
#
# Speed: each export job is wrapped in a per-notebook cache keyed on the notebook
# SOURCE hash + the WasmTarget/PlutoIslands commit SHAs. A cache HIT (notebook AND
# engine unchanged) restores the prebuilt export and skips the whole Julia
# toolchain; a MISS force-rebuilds just that notebook. So an engine change rebuilds
# all, a one-notebook change rebuilds one, and a docs-only push rebuilds nothing.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Ignore the cache and force-rebuild every notebook"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'assets/shim.js'
      - 'test/notebooks/featured/**'
      - 'test/notebooks/demo.jl'
      - 'test/notebooks/two_groups.jl'
      - '.github/workflows/rebuild-notebooks.yml'

permissions:
  contents: write        # gather commits the refreshed exports back
  actions: write         # gather dispatches docs.yml (a bot push won't auto-trigger it)
  pages: write
  id-token: write

concurrency:
  group: rebuild-notebooks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. discover ────────────────────────────────────────────────────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import glob, os, json
          slugs = [os.path.basename(f)[:-3]
                   for f in sorted(glob.glob("test/notebooks/featured/*.jl"))
                   if "backup" not in os.path.basename(f)]
          slugs += ["two_groups", "wasm islands demo"]  # demo.jl exports as this slug
          arr = [{"slug": s, "name": s.replace(" ", "_")} for s in slugs]
          print("matrix=" + json.dumps(arr))
          PY

  # ── 2. export (parallel, one notebook per job, hash-cached) ────────────────
  export:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        notebook: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      # PI.jl and WasmTarget.jl must be SIBLINGS: PI's Project.toml has
      # [sources] WasmTarget = {path = "../WasmTarget.jl"}.
      - name: Checkout PlutoIslands.jl
        uses: actions/checkout@v4
        with: { path: PlutoIslands.jl }
      - name: Checkout WasmTarget.jl (path-dep sibling)
        uses: actions/checkout@v4
        with: { repository: GroupTherapyOrg/WasmTarget.jl, path: WasmTarget.jl }

      - id: keys
        name: Cache key parts (engine SHAs)
        run: |
          echo "wt=$(git -C WasmTarget.jl rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "pi=$(git -C PlutoIslands.jl rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      # cache the staged export; key invalidates on this notebook's source OR the
      # engine SHAs. force=true skips the restore by salting the key with the run id.
      - id: cache
        uses: actions/cache@v4
        with:
          path: PlutoIslands.jl/_nbout
          key: pi-nbexport-v1-${{ matrix.notebook.name }}-${{ hashFiles(format('PlutoIslands.jl/test/notebooks/featured/{0}.jl', matrix.notebook.slug)) }}-wt${{ steps.keys.outputs.wt }}-pi${{ steps.keys.outputs.pi }}-${{ inputs.force && github.run_id || 'cache' }}

      - if: steps.cache.outputs.cache-hit != 'true'
        uses: julia-actions/setup-julia@v2
        with: { version: '1.12' }
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: julia-actions/cache@v2
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Instantiate PI project
        working-directory: PlutoIslands.jl
        run: julia --project=. -e 'using Pkg; Pkg.Registry.add("General"); Pkg.resolve(); Pkg.instantiate()'
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Export this notebook → WASM islands (cache miss → force-rebuild it)
        working-directory: PlutoIslands.jl
        env:
          FORCE_NB_REBUILD: '1'
        run: julia --project=. --optimize=3 docs/export_notebooks.jl "${{ matrix.notebook.slug }}"
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Stage just this notebook's outputs
        working-directory: PlutoIslands.jl
        run: |
          mkdir -p _nbout
          slug='${{ matrix.notebook.slug }}'
          cp -v "docs/notebooks-static/${slug}.html"          "_nbout/" 2>/dev/null || true
          cp -v "docs/notebooks-static/${slug}.fragment.html" "_nbout/" 2>/dev/null || true
          cp -rv "docs/notebooks-static/${slug}.islands"      "_nbout/" 2>/dev/null || true
          python3 - "$slug" '${{ matrix.notebook.name }}' <<'PY'
          import sys, json
          slug, name = sys.argv[1], sys.argv[2]
          idx = json.load(open("docs/notebooks-static/index.json"))
          e = next((x for x in idx if x.get("slug") == slug), None)
          json.dump(e, open(f"_nbout/_entry_{name}.json", "w"))
          PY

      - name: Cache status
        run: echo "${{ matrix.notebook.name }} cache-hit=${{ steps.cache.outputs.cache-hit || 'false' }}"
      - name: Upload notebook export
        uses: actions/upload-artifact@v4
        with:
          name: nb-${{ matrix.notebook.name }}
          path: PlutoIslands.jl/_nbout
          retention-days: 7
          if-no-files-found: warn

  # ── 3. gather → merge → commit refreshed exports → redeploy docs ───────────
  gather:
    needs: export
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all notebook artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nb-*
          path: _artifacts
          merge-multiple: true
      - name: Merge into docs/notebooks-static + rebuild index.json
        run: |
          mkdir -p docs/notebooks-static
          shopt -s dotglob nullglob
          for item in _artifacts/*; do
            base=$(basename "$item")
            case "$base" in
              _entry_*.json) : ;;
              *) cp -rv "$item" "docs/notebooks-static/" ;;
            esac
          done
          python3 - <<'PY'
          import glob, json
          entries = []
          for f in sorted(glob.glob("_artifacts/_entry_*.json")):
              try: d = json.load(open(f))
              except Exception: d = None
              if d: entries.append(d)
          entries.sort(key=lambda e: e.get("slug", ""))
          json.dump(entries, open("docs/notebooks-static/index.json", "w"), indent=2)
          print(f"combined index.json: {len(entries)} notebooks")
          PY
      - name: Commit refreshed exports + redeploy docs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/notebooks-static
          if git diff --cached --quiet; then
            echo "no export changes — nothing to commit"
          else
            # [skip ci] so this bot commit doesn't re-trigger THIS workflow (loop)
            git commit -m "ci: rebuild notebook WASM exports [skip ci]"
            git push
          fi
          # a GITHUB_TOKEN push never triggers docs.yml → dispatch it explicitly so
          # the site redeploys with the fresh exports
          gh workflow run docs.yml --ref main || echo "docs.yml dispatch skipped"
